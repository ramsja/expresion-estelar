<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Editar · Expresión Estelar</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet"><style>
:root{--ink:#21172c;--violet:#6c4c91;--line:#ddd3e7}*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#eee5ff,#fde8f6,#e4f1ff);font:14px/1.5 Manrope,sans-serif;color:var(--ink)}header{padding:24px max(4vw,20px);display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.7);position:sticky;top:0;z-index:3;backdrop-filter:blur(12px)}h1,h2{font-family:"Cormorant Garamond",serif}h1{margin:0;font-size:32px}header a{color:inherit}main{max-width:1040px;margin:42px auto;padding:0 20px}.notice{background:#291d37;color:white;padding:20px 24px;margin-bottom:24px;border-radius:14px}.card{background:rgba(255,255,255,.9);border:1px solid rgba(255,255,255,.8);padding:28px;margin-bottom:20px;border-radius:18px;box-shadow:0 18px 50px rgba(60,40,80,.08)}h2{font-size:30px;margin:0 0 20px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:15px}input,textarea{width:100%;display:block;margin-top:7px;border:1px solid var(--line);background:#fff;padding:12px;border-radius:8px;font:14px Manrope,sans-serif}textarea{resize:vertical}.wide{grid-column:1/-1}.service-editor{border-top:1px solid var(--line);padding-top:20px;margin-top:20px}.actions{display:flex;gap:12px;flex-wrap:wrap;position:sticky;bottom:16px;background:rgba(255,255,255,.92);padding:16px;border-radius:14px;box-shadow:0 12px 40px rgba(50,30,70,.16)}button,.button{border:0;background:var(--ink);color:white;padding:13px 18px;border-radius:7px;font:600 12px Manrope,sans-serif;letter-spacing:.05em;cursor:pointer;text-decoration:none}.secondary{background:var(--violet)}.ghost{background:white;color:var(--ink);border:1px solid var(--line)}small{color:#665c70}@media(max-width:650px){.grid{grid-template-columns:1fr}.wide{grid-column:auto}}
</style></head><body><header><h1>Editor de Rebeca Presidente</h1><a href="index.html">Ver sitio ↗</a></header><main><div class="notice"><strong>Sin tocar código.</strong> Edita los campos y descarga el archivo actualizado. Después envía <em>site-data.json</em> a la persona encargada de publicar la web.</div><form id="editor"><section class="card"><h2>Portada y esencia</h2><div class="grid"><label>Frase principal<textarea name="heroQuote" rows="3"></textarea></label><label>Título de la sección<input name="aboutTitle"></label><label class="wide">Texto “Qué es” (un párrafo por línea)<textarea name="about" rows="7"></textarea></label></div></section><section class="card"><h2>Sobre mí</h2><div class="grid"><label>Nombre<input name="person.name"></label><label>Presentación corta<textarea name="person.shortBio" rows="3"></textarea></label><label class="wide">Biografía (un párrafo por línea)<textarea name="person.bio" rows="8"></textarea></label></div></section><section class="card"><h2>Servicios y precios</h2><div id="services"></div></section><section class="card"><h2>Agenda y contacto</h2><div class="grid"><label>Días disponibles<input name="schedule.days"></label><label>Horas, separadas por coma<input name="schedule.times"></label><label>Número de WhatsApp<input name="contact.whatsapp"></label><label>Mensaje inicial<textarea name="contact.defaultMessage" rows="3"></textarea></label></div></section><div class="actions"><button type="submit">Descargar cambios</button><button type="button" class="secondary" id="save-local">Guardar borrador</button><button type="button" class="ghost" id="reset">Restaurar</button></div></form></main><script src="admin.js"></script></body></html>
